apiVersion: flows.netobserv.io/v1beta2
kind: FlowCollector
metadata:
  name: cluster
spec:
  namespace: netobserv
  deploymentModel: Service

  agent:
    type: eBPF
    ebpf:
      sampling: 400
      cacheMaxFlows: 120000
      cacheActiveTimeout: 15s
      privileged: true
      features:
        - PacketDrop
        - UDNMapping
        - PacketTranslation
        - NetworkEvents
        - FlowRTT
      excludeInterfaces:
        - lo
      resources:
        limits:
          memory: 800Mi
        requests:
          cpu: 100m
          memory: 50Mi

  processor:
    logTypes: Flows
    consumerReplicas: 3
    resources:
      limits:
        memory: 800Mi
      requests:
        cpu: 100m
        memory: 100Mi

  loki:
    enable: true
    mode: LokiStack
    lokiStack:
      name: lokistack-sample
      namespace: netobserv
    writeBatchSize: 10485760
    writeBatchWait: 1s
    writeTimeout: 10s
    readTimeout: 30s

  consolePlugin:
    enable: true
    replicas: 2
    portNaming:
      enable: true
    quickFilters:
      - name: Applications
        filter:
          flow_layer: '"app"'
        default: true
      - name: Infrastructure
        filter:
          flow_layer: '"infra"'
      - name: Pods network
        filter:
          src_kind: '"Pod"'
          dst_kind: '"Pod"'
        default: true
      - name: Services network
        filter:
          dst_kind: '"Service"'
      - name: External ingress
        filter:
          src_subnet_label: '"",EXT:'
      - name: External egress
        filter:
          dst_subnet_label: '"",EXT:'
    resources:
      limits:
        cpu: 1000m
        memory: 2Gi
      requests:
        cpu: 100m
        memory: 100Mi

  networkPolicy:
    enable: true
    additionalNamespaces:
      - udn-poc

  prometheus:
    querier:
      enable: true
      mode: Auto
      timeout: 30s
